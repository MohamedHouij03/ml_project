{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Connexion</h1>
  <form method="post" action="{{ request.path }}">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <ul class="errorlist">{{ form.non_field_errors }}</ul>
    {% endif %}
    <label for="id_username">Nom d’utilisateur</label>
    {{ form.username }}
    <label for="id_password">Mot de passe</label>
    {{ form.password }}
    <button type="submit" class="btn btn-auth">Se connecter</button>
  </form>
  <p class="auth-switch">Pas encore de compte ? <a href="{% url 'signup' %}">Créer un compte</a></p>
</div>
{% endblock %}
